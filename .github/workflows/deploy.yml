name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: cpsy300acrgroupsix.azurecr.io/diet-analysis

jobs:

  # ── 1. Run tests ──────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Run tests
        run: pytest
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ── 2. Build image and push to ACR ───────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: cpsy300acrgroupsix.azurecr.io
          username:     ${{ secrets.REGISTRY_USERNAME }}
          password:     ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t $IMAGE_NAME:${{ github.sha }} ./backend
          docker tag  $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest
          docker push $IMAGE_NAME:${{ github.sha }}
          docker push $IMAGE_NAME:latest

  # ── 3. Deploy to Azure App Service ───────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name:       cpsy300groupsix
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images:         cpsy300acrgroupsix.azurecr.io/diet-analysis:latest
